name: Fetch TTForecast

on:
  schedule:
    - cron: '0 */3 * * *'   # a cada 3 horas
  workflow_dispatch:         # permite rodar manualmente

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch forecast data
        env:
          TTFORECAST_TOKEN: ${{ secrets.TTFORECAST_TOKEN }}
        run: node scrape-forecast.js

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/forecast.json
          if ! git diff --staged --quiet; then
            git commit -m "data: atualiza previsão $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push origin main
          else
            echo "Sem alterações na previsão."
          fi
